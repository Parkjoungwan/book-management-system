<svg viewBox="0 0 1120 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>API 명세서 — Book Manager REST API</title>
  <desc>Book Manager REST API 전체 엔드포인트 명세</desc>
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/>
    </filter>
  </defs>

  <rect width="1120" height="640" fill="#f8f9fc"/>
  <text x="560" y="38" font-family="Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#1a1a2e" text-anchor="middle">API 명세서 — Book Manager REST API</text>

  <!-- column x:  # 50 | method 80 | endpoint 145 | request 545 | response 800 | desc 920 -->

  <!-- Header -->
  <rect x="30" y="54" width="1060" height="34" rx="8" fill="#3461D1"/>
  <text x="50"  y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">#</text>
  <text x="80"  y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">Method</text>
  <text x="145" y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">Endpoint</text>
  <text x="545" y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">Request Body / Params</text>
  <text x="800" y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">Response</text>
  <text x="920" y="76" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="white">설명</text>

  <!-- Section: Book API -->
  <rect x="30" y="90" width="1060" height="20" fill="#eef1fb"/>
  <text x="44" y="104" font-family="Segoe UI,sans-serif" font-size="10" font-weight="700" fill="#3461D1">■  BOOK API  ·  /books</text>

  <!-- Row 1 -->
  <rect x="30" y="110" width="1060" height="36" fill="white"/>
  <text x="50" y="132" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">1</text>
  <rect x="78" y="116" width="54" height="22" rx="4" fill="#27ae60"/>
  <text x="105" y="131" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">GET</text>
  <text x="145" y="131" font-family="monospace" font-size="12" fill="#3461D1">/books</text>
  <text x="545" y="131" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">?page= &amp; size= &amp; sort= &amp; search=  (optional)</text>
  <text x="800" y="131" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + Page&lt;Book&gt;</text>
  <text x="920" y="131" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">목록 조회 (페이지·검색)</text>

  <!-- Row 2 -->
  <rect x="30" y="146" width="1060" height="36" fill="#f9f9f9"/>
  <text x="50" y="168" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">2</text>
  <rect x="78" y="152" width="54" height="22" rx="4" fill="#27ae60"/>
  <text x="105" y="167" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">GET</text>
  <text x="145" y="167" font-family="monospace" font-size="12" fill="#3461D1">/books/{id}</text>
  <text x="545" y="167" font-family="Segoe UI,sans-serif" font-size="11" fill="#888">—</text>
  <text x="800" y="167" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + Book</text>
  <text x="920" y="167" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">상세 조회</text>

  <!-- Row 3 -->
  <rect x="30" y="182" width="1060" height="36" fill="white"/>
  <text x="50" y="204" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">3</text>
  <rect x="78" y="188" width="54" height="22" rx="4" fill="#3461D1"/>
  <text x="105" y="203" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">POST</text>
  <text x="145" y="203" font-family="monospace" font-size="12" fill="#3461D1">/books</text>
  <text x="545" y="203" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">title* , content*  (author 선택)</text>
  <text x="800" y="203" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">201 + Book</text>
  <text x="920" y="203" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">도서 등록</text>

  <!-- Row 4 -->
  <rect x="30" y="218" width="1060" height="36" fill="#f9f9f9"/>
  <text x="50" y="240" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">4</text>
  <rect x="78" y="224" width="54" height="22" rx="4" fill="#f39c12"/>
  <text x="105" y="239" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">PATCH</text>
  <text x="145" y="239" font-family="monospace" font-size="12" fill="#3461D1">/books/{id}</text>
  <text x="545" y="239" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">title? , author? , content?</text>
  <text x="800" y="239" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + Book</text>
  <text x="920" y="239" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">도서 부분 수정</text>

  <!-- Row 5 -->
  <rect x="30" y="254" width="1060" height="36" fill="white"/>
  <text x="50" y="276" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">5</text>
  <rect x="78" y="260" width="54" height="22" rx="4" fill="#e74c3c"/>
  <text x="105" y="275" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">DELETE</text>
  <text x="145" y="275" font-family="monospace" font-size="12" fill="#3461D1">/books/{id}</text>
  <text x="545" y="275" font-family="Segoe UI,sans-serif" font-size="11" fill="#888">—</text>
  <text x="800" y="275" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">204 No Content</text>
  <text x="920" y="275" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">도서 삭제</text>

  <!-- Row 6 -->
  <rect x="30" y="290" width="1060" height="36" fill="#f9f9f9"/>
  <text x="50" y="312" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">6</text>
  <rect x="78" y="296" width="54" height="22" rx="4" fill="#f39c12"/>
  <text x="105" y="311" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">PATCH</text>
  <text x="145" y="311" font-family="monospace" font-size="12" fill="#3461D1">/books/{id}/cover</text>
  <text x="545" y="311" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">coverImageUrl</text>
  <text x="800" y="311" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + Book</text>
  <text x="920" y="311" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">AI 표지 URL 저장</text>

  <!-- Row 7 -->
  <rect x="30" y="326" width="1060" height="36" fill="white"/>
  <text x="50" y="348" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">7</text>
  <rect x="78" y="332" width="54" height="22" rx="4" fill="#3461D1"/>
  <text x="105" y="347" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">POST</text>
  <text x="145" y="347" font-family="monospace" font-size="12" fill="#3461D1">/books/{id}/cover/generate</text>
  <text x="545" y="347" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">apiKey* , prompt? , quality? , size? , outputFormat?</text>
  <text x="800" y="347" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + Book</text>
  <text x="920" y="347" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">AI 표지 생성·저장</text>

  <!-- Section: Cover History API -->
  <rect x="30" y="362" width="1060" height="20" fill="#edfaf3"/>
  <text x="44" y="376" font-family="Segoe UI,sans-serif" font-size="10" font-weight="700" fill="#1f9e5a">■  COVER HISTORY API  ·  /books/{bookId}/covers</text>

  <!-- Row 8 -->
  <rect x="30" y="382" width="1060" height="36" fill="white"/>
  <text x="50" y="404" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">8</text>
  <rect x="78" y="388" width="54" height="22" rx="4" fill="#27ae60"/>
  <text x="105" y="403" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">GET</text>
  <text x="145" y="403" font-family="monospace" font-size="12" fill="#1f9e5a">/books/{bookId}/covers</text>
  <text x="545" y="403" font-family="Segoe UI,sans-serif" font-size="11" fill="#888">—</text>
  <text x="800" y="403" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + BookCover[]</text>
  <text x="920" y="403" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">표지 이력 목록 조회</text>

  <!-- Row 9 -->
  <rect x="30" y="418" width="1060" height="36" fill="#f9f9f9"/>
  <text x="50" y="440" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">9</text>
  <rect x="78" y="424" width="54" height="22" rx="4" fill="#3461D1"/>
  <text x="105" y="439" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">POST</text>
  <text x="145" y="439" font-family="monospace" font-size="12" fill="#1f9e5a">/books/{bookId}/covers</text>
  <text x="545" y="439" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">imageUrl* , quality? , size? , outputFormat?</text>
  <text x="800" y="439" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">201 + BookCover</text>
  <text x="920" y="439" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">표지 이력 저장</text>

  <!-- Row 10 -->
  <rect x="30" y="454" width="1060" height="36" fill="white"/>
  <text x="50" y="476" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">10</text>
  <rect x="78" y="460" width="54" height="22" rx="4" fill="#f39c12"/>
  <text x="105" y="475" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">PATCH</text>
  <text x="145" y="475" font-family="monospace" font-size="12" fill="#1f9e5a">/books/{bookId}/covers/{coverId}/activate</text>
  <text x="545" y="475" font-family="Segoe UI,sans-serif" font-size="11" fill="#888">—</text>
  <text x="800" y="475" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">200 + BookCover</text>
  <text x="920" y="475" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">대표 표지 지정</text>

  <!-- Row 11 -->
  <rect x="30" y="490" width="1060" height="36" fill="#f9f9f9"/>
  <text x="50" y="512" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">11</text>
  <rect x="78" y="496" width="54" height="22" rx="4" fill="#e74c3c"/>
  <text x="105" y="511" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">DELETE</text>
  <text x="145" y="511" font-family="monospace" font-size="12" fill="#1f9e5a">/books/{bookId}/covers/{coverId}</text>
  <text x="545" y="511" font-family="Segoe UI,sans-serif" font-size="11" fill="#888">—</text>
  <text x="800" y="511" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">204 No Content</text>
  <text x="920" y="511" font-family="Segoe UI,sans-serif" font-size="11" fill="#555">표지 이력 삭제</text>

  <!-- Footer -->
  <rect x="30" y="526" width="1060" height="30" rx="0" fill="#f0f0f0"/>
  <rect x="30" y="540" width="1060" height="16" rx="8" fill="#f0f0f0"/>
  <text x="560" y="546" font-family="Segoe UI,sans-serif" font-size="10" fill="#888" text-anchor="middle">*  필수 필드     ?  선택 필드     |     오류 응답:  404 도서/표지 없음  ·  400 검증 실패  ·  400 소유권 불일치</text>
</svg>
